name: Rebuild CNG Dataset

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      osm_only:
        description: 'Only run OSM fetch (faster, for testing)'
        required: false
        type: boolean
        default: false
      no_geocode:
        description: 'Skip Nominatim geocoding enrichment'
        required: false
        type: boolean
        default: true
      skip_cgd_cities:
        description: 'Skip CGD cities inference step (faster)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p raw_sources dataset/india pending

      # ── Tier 1: Official PDFs and operator websites (exact coordinates) ────────
      - name: GAIL Gas PDF — 220 stations (S3-hosted PDF)
        run: python scripts/fetch_gail_gas_pdf.py
        continue-on-error: true

      - name: MNGL Pune — 118 CNG stations (exact coordinates from website)
        run: python scripts/fetch_mngl.py
        continue-on-error: true

      # ── Tier 2: OSM targeted CNG queries ──────────────────────────────────────
      - name: OSM — CNG-tagged stations (original comprehensive query)
        run: python scripts/fetch_osm_cng.py
        continue-on-error: true

      - name: OSM — All-stations sweep (fuel:cng + name~CNG + CGD operators)
        run: python scripts/fetch_osm_allstations.py
        continue-on-error: true

      - name: OSM — Extra targeted queries
        run: python scripts/fetch_overpass_extra.py
        continue-on-error: true

      # ── Tier 3: Operator websites (geocoded) ─────────────────────────────────
      - name: Gujarat Gas — 343+ stations (main + test website)
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_gujarat_gas_v2.py
        continue-on-error: true

      - name: IGL + MGL — Deep zone Overpass queries
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_igl_mgl_deep.py
        continue-on-error: true

      - name: ATGL — Zone-based Overpass queries
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_atgl_v2.py
        continue-on-error: true

      - name: Wikidata — SPARQL queries for CGD entities
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_wikidata.py
        continue-on-error: true

      # ── Tier 4: City-grid Nominatim/Photon search ─────────────────────────────
      - name: Nominatim + Photon — 200-city grid search
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_nominatim_grid.py
        continue-on-error: true

      # ── Tier 5: Geographic inference (all fuel stations in CGD areas) ──────────
      - name: CGD Cities — All fuel stations in 360 CGD-authorized areas
        if: ${{ github.event.inputs.osm_only != 'true' && github.event.inputs.skip_cgd_cities != 'true' }}
        run: python scripts/fetch_cgd_cities.py
        continue-on-error: true
        timeout-minutes: 150

      # ── Legacy scrapers (kept for backwards compatibility) ────────────────────
      - name: GAIL Gas — legacy scraper
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_gail_gas.py
        continue-on-error: true

      - name: IGL — legacy scraper
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_igl.py
        continue-on-error: true

      - name: MGL — legacy scraper
        if: ${{ github.event.inputs.osm_only != 'true' }}
        run: python scripts/fetch_mgl.py
        continue-on-error: true

      # ── Build merged dataset ───────────────────────────────────────────────────
      - name: Build merged dataset
        run: |
          ARGS="--no-geocode"
          python scripts/build_dataset.py $ARGS

      - name: Show dataset stats
        run: |
          echo "=== Dataset summary ==="
          python -c "
          import json, pathlib
          meta = pathlib.Path('dataset/meta.json')
          if meta.exists():
              m = json.loads(meta.read_text())
              print(f'  Total stations : {m[\"total_stations\"]}')
              print(f'  States covered : {m[\"states_covered\"]}')
              print(f'  Generated at   : {m[\"generated_at\"]}')
              print('  By source:')
              for src, count in sorted(m.get(\"sources\",{}).items(), key=lambda x: -x[1]):
                  print(f'    {src:<30} {count}')
          "
          echo ""
          echo "=== Raw source file counts ==="
          python -c "
          import json, pathlib
          total = 0
          for f in sorted(pathlib.Path('raw_sources').glob('*.json')):
              try:
                  d = json.loads(f.read_text())
                  print(f'  {f.name:<40} {len(d):>6}')
                  total += len(d)
              except:
                  pass
          print(f'  {\"TOTAL RAW\":<40} {total:>6}')
          "

      - name: Commit and push if dataset changed
        run: |
          git config user.name  "cng-dataset-bot"
          git config user.email "bot@cng-route-planner.in"
          git add dataset/ raw_sources/
          if git diff --staged --quiet; then
            echo "No dataset changes — nothing to commit."
          else
            STATION_COUNT=$(python -c "import json; d=json.load(open('dataset/stations.json')); print(len(d))" 2>/dev/null || echo "?")
            git commit -m "chore(dataset): auto-refresh — ${STATION_COUNT} stations [skip ci]"
            git push
          fi
